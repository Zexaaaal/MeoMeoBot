<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Goals Widget</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: transparent;
        }

        #widget-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .progress-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #ff00cc, #333399);
            width: 0%;
            border-radius: 18px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(255, 0, 204, 0.5);
            z-index: 1;
        }

        .progress-value {
            position: relative;
            z-index: 10;
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            font-family: 'Montserrat', sans-serif;
        }

        .widget-label {
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
        }
    </style>
    /* __CUSTOM_CSS__ */
</head>

<body>
    <div id="widget-container">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="progress-value" id="progress-value">Loading...</div>
        </div>
        <div class="widget-label" id="widget-label"></div>
    </div>

    <script>
        const GOAL_ID = '__GOAL_ID__';
        let currentGoal = null;
        let currentCounts = {};

        function connectWebSocket() {
            connectWidget((data) => {
                if (data.type === 'config' || data.type === 'config-update') {
                    if (data.widget && data.widget !== 'goals') return;
                    if (data.config) {
                        const goals = data.config.goals || [];
                        currentGoal = goals.find(g => g.id === GOAL_ID) || goals[0] || null;

                        if (currentGoal && typeof currentGoal.customCSS === 'string') {
                            let style = document.getElementById('custom-css');
                            if (!style) {
                                style = document.createElement('style');
                                style.id = 'custom-css';
                                document.head.appendChild(style);
                            }
                            style.textContent = currentGoal.customCSS;
                        }
                        render();
                    }
                } else if (data.type === 'goals-count-update') {
                    currentCounts = data.counts || {};
                    render();
                }
            });
        }

        function render() {
            if (!currentGoal) return;

            const sourceType = currentGoal.sourceType || 'subs';
            const currentCount = currentCounts[sourceType] || 0;
            const targetCount = parseFloat(currentGoal.targetCount) || 100;
            const label = currentGoal.label || 'GOAL';

            let percentage = 0;
            if (targetCount > 0) {
                percentage = (currentCount / targetCount) * 100;
            }
            if (percentage < 0) percentage = 0;
            if (percentage > 100) percentage = 100;

            const bar = document.getElementById('progress-bar');
            bar.style.width = `${percentage}%`;

            const text = document.getElementById('progress-value');
            text.textContent = `${currentCount} / ${targetCount}`;

            const labelEl = document.getElementById('widget-label');
            labelEl.textContent = label;
        }

        connectWebSocket();
    </script>
</body>

</html>
