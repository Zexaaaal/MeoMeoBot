<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Chat - Démo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');

        body {
            background: radial-gradient(ellipse at center, #1a0a1f 0%, #0a0012 100%);
            font-family: 'Rajdhani', sans-serif;
            --enable-pro: 1;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #chat-container {
            position: relative;
            padding: 30px 25px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #chat-container::before {
            content: "";
            position: fixed;
            top: 88px;
            left: 20px;
            right: 20px;
            bottom: 168px;
            background: rgba(0, 0, 0, 0.9);
            z-index: -1;
            pointer-events: none;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        /* === Messages (sans bulles, juste glow) === */
        .msg-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px;
            --user-color: #c77dff;
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Icône utilisateur à gauche */
        .msg-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Contenu du message */
        .msg-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Badge username - CONTOUR UNIQUEMENT avec glow */
        .msg-header {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 18px 5px 16px;
            background: transparent;
            border: 2px solid;
            border-color: var(--user-color);
            border-radius: 50px;
            box-shadow:
                0 0 20px var(--user-color),
                0 0 35px var(--user-color),
                inset 0 0 15px rgba(157, 78, 221, 0.1);
            align-self: flex-start;
        }

        /* Variante jaune/or */
        .msg-group.variant-gold {
            --user-color: #f4c430;
        }

        .msg-group.variant-gold .msg-header {
            box-shadow:
                0 0 20px #f4c430,
                0 0 35px #f4c430,
                inset 0 0 15px rgba(244, 196, 48, 0.1);
        }

        /* Variantes de couleur */
        .msg-group.variant-1 {
            --user-color: #d946ef;
        }

        .msg-group.variant-2 {
            --user-color: #a855f7;
        }

        .msg-group.variant-3 {
            --user-color: #8b5cf6;
        }

        .msg-username {
            color: var(--user-color);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px var(--user-color);
        }

        /* Étoile après le username */
        .msg-username::after {
            content: "✦";
            margin-left: 6px;
            color: var(--user-color);
            font-size: 12px;
            filter: drop-shadow(0 0 4px var(--user-color));
        }

        /* Texte du message - sans fond, juste glow */
        .msg-messages {
            color: #e4e4e7;
            font-size: 16px;
            line-height: 1.6;
            text-shadow: 0 0 12px rgba(157, 78, 221, 0.3);
            padding-left: 4px;
        }

        .msg-line {
            margin-bottom: 4px;
            font-weight: 600;
        }

        .msg-line:last-child {
            margin-bottom: 0;
        }

        /* Emoji et emotes */
        .msg-messages img,
        .msg-line img {
            vertical-align: middle;
            height: 20px;
            width: auto;
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.3));
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(20, 10, 30, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #9d4edd, #c77dff);
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(157, 78, 221, 0.6);
        }
    </style>
</head>

<body>
    <div id="chat-container"></div>

    <script>
        // Setup Pro theme
        function updatePro() {
            const enable = getComputedStyle(document.body).getPropertyValue('--enable-pro').trim() === '1';

            if (!enable) return;

            let header = document.getElementById('pro-header');
            let dots = document.getElementById('pro-header-dots');
            let footer = document.getElementById('pro-footer');

            if (!header) {
                header = document.createElement('div');
                header.id = 'pro-header';
                header.textContent = 'Soo_Meo';
                header.style.cssText = 'position:fixed;top:20px;left:20px;right:20px;font-family:"Road Rage",cursive;font-weight:900;font-size:40px;letter-spacing:8px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.8);background:linear-gradient(135deg,#fdf102 0%,#965ae5 100%);padding:18px 80px 18px 30px;clip-path:polygon(0 0,calc(100% - 40px) 0,100% 25px,100% 100%,0 100%);box-shadow:0 6px 20px rgba(253,241,2,.5),inset 0 3px 0 rgba(255,255,255,.25),inset 0 -3px 0 rgba(0,0,0,.6);border:1px solid rgba(150,90,229,.5);border-left:2px solid rgba(255,255,255,.15);border-top:2px solid rgba(255,255,255,.15);z-index:1000;pointer-events:none';
                document.body.appendChild(header);

                dots = document.createElement('div');
                dots.id = 'pro-header-dots';
                dots.style.cssText = 'position:fixed;top:40px;right:55px;width:70px;height:10px;background:radial-gradient(circle,#1a1410 40%,transparent 45%) 0 0/16px 10px,radial-gradient(circle,#1a1410 40%,transparent 45%) 24px 0/16px 10px,radial-gradient(circle,#1a1410 40%,transparent 45%) 48px 0/16px 10px;background-repeat:no-repeat;z-index:1001;pointer-events:none';
                document.body.appendChild(dots);

                footer = document.createElement('div');
                footer.id = 'pro-footer';
                footer.style.cssText = 'position:fixed;bottom:20px;left:20px;right:20px;height:150px;background:linear-gradient(135deg,#fdf102 0%,#965ae5 100%);clip-path:polygon(0 0,100% 0,100% 100%,calc(100% - 40px) 100%,calc(100% - 65px) calc(100% - 25px),0 calc(100% - 25px));box-shadow:0 -6px 20px rgba(253,241,2,.5),inset 0 3px 0 rgba(255,255,255,.25),inset 0 -3px 0 rgba(0,0,0,.6);border:1px solid rgba(150,90,229,.5);border-left:2px solid rgba(255,255,255,.15);border-bottom:2px solid rgba(255,255,255,.15);z-index:1000;pointer-events:none';
                document.body.appendChild(footer);

                const chatContainer = document.getElementById('chat-container');
                if (chatContainer) {
                    chatContainer.style.paddingTop = '90px';
                    chatContainer.style.paddingBottom = '170px';
                }
            }
        }

        updatePro();

        const dummyMessages = [
            { user: 'Zexaasal', icon: '◆', variant: 'variant-1', messages: ['montre ton frein'] },
            { user: 'Zaxaasal', icon: '◆', variant: 'variant-2', messages: ['enfin là où il était, ça fonctionnera aussi'] },
            { user: 'VengeurFantome', icon: '😊', variant: 'variant-gold', messages: ['🤣🤣🤣'] },
            { user: 'n_CeLaPe0_379', icon: '◆', variant: 'variant-3', messages: ['Mrrrr comment tu essaie de te rattraper tu me termine 😳'] },
            { user: 'n_CeLaPe0_379', icon: '◆', variant: 'variant-3', messages: ['Y\'en a pas un pour rattraper l\'autre il est perdu Lokki 🤣🔥🔥'] },
            { user: 'CeLyPe00mamangask', icon: '😊', variant: 'variant-gold', messages: ['toi tu fais pas d\'effort non plus !! Prends des trucs en silicone !'] },
            { user: 'TechNinja', icon: '◆', variant: 'variant-1', messages: ['GG le stream !', 'Incroyable cette partie 🚀'] },
            { user: 'CyberQueen', icon: '😊', variant: 'variant-2', messages: ['J\'adore ce jeu tellement !'] }
        ];

        let messageIndex = 0;

        function addMessage() {
            if (messageIndex >= dummyMessages.length) {
                console.log('Tous les messages ont été affichés');
                return;
            }

            const msg = dummyMessages[messageIndex];
            const container = document.getElementById('chat-container');

            // Créer un nouveau groupe pour chaque message
            const group = document.createElement('div');
            group.className = `msg-group ${msg.variant}`;

            // Icône
            const icon = document.createElement('div');
            icon.className = 'msg-icon';
            icon.textContent = msg.icon;

            // Contenu
            const content = document.createElement('div');
            content.className = 'msg-content';

            // Header avec username
            const header = document.createElement('div');
            header.className = 'msg-header';
            const username = document.createElement('span');
            username.className = 'msg-username';
            username.textContent = msg.user;
            header.appendChild(username);

            // Messages
            const messagesDiv = document.createElement('div');
            messagesDiv.className = 'msg-messages';

            msg.messages.forEach(text => {
                const line = document.createElement('div');
                line.className = 'msg-line';
                line.innerHTML = text.replace(/([🤣😳🔥🚀😊])/g, '<span class="emoji">$1</span>');
                messagesDiv.appendChild(line);
            });

            content.appendChild(header);
            content.appendChild(messagesDiv);

            group.appendChild(icon);
            group.appendChild(content);

            container.appendChild(group);

            messageIndex++;

            // Auto-scroll
            container.scrollTop = container.scrollHeight;
        }

        // Start adding messages every 1.5 seconds
        setInterval(addMessage, 1500);

        // Add first message immediately
        setTimeout(addMessage, 500);
    </script>
</body>

</html>
